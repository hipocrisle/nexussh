id: org.hipogas.nexussh
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: nexussh

# Изолированный рантайм GNOME даёт согласованные GLib/GTK/WebKit —
# никакого конфликта с системными либами (в отличие от AppImage).
finish-args:
  - --share=ipc
  - --share=network          # SSH + встроенный xray-VPN
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home        # ~/.ssh, импорт хостов, vault
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: nexussh
    buildsystem: simple
    build-commands:
      # Вход — usr-дерево из Tauri .deb, упакованное на хосте сборки (nexussh-fs.tar.gz).
      - tar -xf nexussh-fs.tar.gz
      - mkdir -p /app/bin
      - cp -a usr/bin/. /app/bin/
      - 'if [ -d usr/lib ]; then cp -a usr/lib/. /app/lib/ 2>/dev/null || true; fi'
      # .desktop → имя по app-id + Icon=app-id
      - |
        d=$(ls usr/share/applications/*.desktop | head -1)
        install -Dm644 "$d" /app/share/applications/org.hipogas.nexussh.desktop
        sed -i 's/^Icon=.*/Icon=org.hipogas.nexussh/' /app/share/applications/org.hipogas.nexussh.desktop
        sed -i 's|^Exec=.*|Exec=nexussh|' /app/share/applications/org.hipogas.nexussh.desktop
      # иконки → имя по app-id
      - |
        for png in $(find usr/share/icons -name '*.png' 2>/dev/null); do
          sz=$(echo "$png" | grep -oE '[0-9]+x[0-9]+' | head -1)
          [ -n "$sz" ] && install -Dm644 "$png" "/app/share/icons/hicolor/$sz/apps/org.hipogas.nexussh.png" || true
        done
      - install -Dm644 org.hipogas.nexussh.metainfo.xml /app/share/metainfo/org.hipogas.nexussh.metainfo.xml
    sources:
      - type: file
        path: nexussh-fs.tar.gz
      - type: file
        path: org.hipogas.nexussh.metainfo.xml
