name: Build NexuSSH

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexussh-windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: nexussh-linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config \
            patchelf

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Clean prior bundle artifacts (avoid stale cached versions)
        working-directory: desktop/src-tauri
        shell: bash
        run: rm -rf target/${{ matrix.target }}/release/bundle

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          retention-days: 14

      - name: Upload Linux packages
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
          retention-days: 14

      - name: Upload release assets (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          # Keep DRAFT until latest.json is uploaded — otherwise the release
          # becomes "latest" while /releases/latest/download/latest.json is
          # still 404, and the in-app updater errors "Could not fetch a valid
          # release JSON". generate-update-manifest publishes it at the end.
          draft: true
          prerelease: false

  generate-update-manifest:
    name: Generate updater manifest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Fetch signature files from the release we just published.
          mkdir -p /tmp/sigs && cd /tmp/sigs
          gh release download "$TAG" --repo "${{ github.repository }}" -p "*.sig" || true
          # The signature is a base64 blob — base64-encode the sig file content.
          WIN_SIG=$(cat *.exe.sig 2>/dev/null | head -1 || true)
          LINUX_SIG=$(cat *.AppImage.sig 2>/dev/null | head -1 || true)
          cd "$GITHUB_WORKSPACE"

          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          # Discover the actual exe/AppImage file names by listing the release.
          # Filter by version embedded in the filename so stale cached artifacts
          # from a previous build don't sneak in.
          WIN_FILE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq ".assets[] | select(.name | contains(\"$VERSION\") and endswith(\".exe\")) | .name" | head -1)
          LINUX_FILE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq ".assets[] | select(.name | contains(\"$VERSION\") and endswith(\".AppImage\")) | .name" | head -1)

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub.",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "$BASE/$WIN_FILE"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "$BASE/$LINUX_FILE"
              }
            }
          }
          EOF
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber

      - name: Publish release (draft → latest, after latest.json is in place)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --draft=false --latest
