name: Build NexuSSH

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexussh-windows
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: nexussh-linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Guard against the manifest/build version drift that caused the updater
      # loop: the updater manifest derives its version from the git TAG, while
      # the built app's version comes from tauri.conf.json. If they diverge
      # (e.g. tag v2.2.1-beta.1 but config left at 2.2.1), `version !=
      # current_version` is never satisfied and clients loop forever. Fail fast.
      - name: Verify tag matches app version (no manifest/build drift)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: desktop
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          CONF_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VER  tauri.conf.json=$CONF_VER  package.json=$PKG_VER"
          if [ "$CONF_VER" != "$TAG_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != tauri.conf.json version $CONF_VER — bump the version before tagging."
            exit 1
          fi
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != package.json version $PKG_VER — bump the version before tagging."
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # .deb + .rpm используют СИСТЕМНЫЙ WebKitGTK (зависимость пакета) — поэтому
      # рендерят на любой современной Ubuntu/CentOS без белого экрана (в отличие от
      # AppImage с встроенным старым webkit). `rpm` нужен для сборки .rpm-бандла.
      - name: Install Linux build deps (+ rpm for .rpm bundle)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config \
            patchelf rpm

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Fetch xray-core sidecar
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          mkdir -p binaries
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)   ASSET=Xray-windows-64.zip; BIN=xray.exe; OUT="binaries/xray-${{ matrix.target }}.exe";;
            x86_64-unknown-linux-gnu) ASSET=Xray-linux-64.zip;   BIN=xray;     OUT="binaries/xray-${{ matrix.target }}";;
            *) echo "no xray asset mapping for ${{ matrix.target }}"; exit 1;;
          esac
          curl -fSL -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/$ASSET"
          unzip -o xray.zip "$BIN" -d xray_tmp
          mv "xray_tmp/$BIN" "$OUT"
          chmod +x "$OUT" || true
          rm -rf xray.zip xray_tmp
          ls -la "$OUT"

      - name: Clean prior bundle artifacts (avoid stale cached versions)
        working-directory: desktop/src-tauri
        shell: bash
        run: rm -rf target/${{ matrix.target }}/release/bundle

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: List Linux bundles (debug — confirm .deb/.rpm + .sig exist)
        if: matrix.os == 'ubuntu-24.04'
        run: ls -laR desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm || true

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          retention-days: 14

      - name: Upload Linux packages (.deb + .rpm + sigs)
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm.sig
          retention-days: 14

      # STABLE tags only create a versioned release. Beta installers are pushed
      # to the rolling channel-beta release by the manifest job (from the build
      # artifacts above) — so betas never pile up versioned releases and the
      # latest stable always sits on top of the releases page.
      - name: Upload release assets (STABLE tag push only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta.') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm.sig
          # DRAFT до публикации latest.json — иначе релиз станет latest, пока
          # latest.json ещё 404, и in-app updater словит "Could not fetch release JSON".
          draft: true
          prerelease: false

  generate-update-manifest:
    name: Generate updater manifest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── STABLE ────────────────────────────────────────────────────────────
      # Installers live on the versioned release (created by the build job).
      # Manifest → that release + channel-stable (2.0.0+ clients) + releases/latest
      # (back-compat for ≤1.8.11). The versioned release is published as "latest"
      # so it sits on top of the releases page.
      - name: Stable — manifest + publish
        if: ${{ !contains(github.ref_name, '-beta.') }}
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p /tmp/sigs && cd /tmp/sigs
          gh release download "$TAG" --repo "$REPO" -p "*.sig" || true
          WIN_SIG=$(cat *.exe.sig 2>/dev/null | head -1 || true)
          DEB_SIG=$(cat *.deb.sig 2>/dev/null | head -1 || true)
          RPM_SIG=$(cat *.rpm.sig 2>/dev/null | head -1 || true)
          cd "$GITHUB_WORKSPACE"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          pick() { gh release view "$TAG" --repo "$REPO" --json assets \
                   --jq ".assets[] | select(.name | endswith(\"$1\")) | .name" | head -1; }
          WIN_FILE=$(pick ".exe"); DEB_FILE=$(pick ".deb"); RPM_FILE=$(pick ".rpm")
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub.",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64":   { "signature": "$WIN_SIG", "url": "$BASE/$WIN_FILE" },
              "linux-x86_64-deb": { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" },
              "linux-x86_64-rpm": { "signature": "$RPM_SIG", "url": "$BASE/$RPM_FILE" },
              "linux-x86_64":     { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" }
            }
          }
          EOF
          cat latest.json
          if ! gh release view channel-stable --repo "$REPO" >/dev/null 2>&1; then
            gh release create channel-stable --repo "$REPO" --prerelease --target main \
              --title channel-stable --notes "Rolling stable updater manifest — do not delete."
          fi
          gh release upload channel-stable latest.json --repo "$REPO" --clobber
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest

          # Prune older STABLE versioned releases — keep ONLY this one (latest
          # sits on top) plus the rolling channel-stable/channel-beta. Betas
          # never create versioned releases, so they are unaffected.
          for t in $(gh release list --repo "$REPO" --json tagName,isPrerelease \
                       --jq '.[] | select(.isPrerelease==false) | .tagName'); do
            case "$t" in
              "$TAG"|channel-*|*-beta.*) continue ;;
              v*) echo "prune old stable release $t"
                  gh release delete "$t" --repo "$REPO" --yes --cleanup-tag || true ;;
            esac
          done

      # ── BETA ──────────────────────────────────────────────────────────────
      # No versioned release. Installers + manifest live on the single rolling
      # channel-beta release (keeps the page free of beta pile-up; stable stays
      # on top). Installers come from the build artifacts.
      - name: Beta — download build artifacts
        if: ${{ contains(github.ref_name, '-beta.') }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Beta — publish installers + manifest to channel-beta
        if: ${{ contains(github.ref_name, '-beta.') }}
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          A=/tmp/artifacts
          EXE=$(find "$A" -name '*.exe' | head -1)
          DEB=$(find "$A" -name '*.deb' | head -1)
          RPM=$(find "$A" -name '*.rpm' | head -1)
          WIN_SIG=$(cat "$(find "$A" -name '*.exe.sig' | head -1)" 2>/dev/null || true)
          DEB_SIG=$(cat "$(find "$A" -name '*.deb.sig' | head -1)" 2>/dev/null || true)
          RPM_SIG=$(cat "$(find "$A" -name '*.rpm.sig' | head -1)" 2>/dev/null || true)
          WIN_FILE=$(basename "$EXE"); DEB_FILE=$(basename "$DEB"); RPM_FILE=$(basename "$RPM")
          echo "beta installers: $WIN_FILE $DEB_FILE $RPM_FILE"
          BASE="https://github.com/$REPO/releases/download/channel-beta"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub.",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64":   { "signature": "$WIN_SIG", "url": "$BASE/$WIN_FILE" },
              "linux-x86_64-deb": { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" },
              "linux-x86_64-rpm": { "signature": "$RPM_SIG", "url": "$BASE/$RPM_FILE" },
              "linux-x86_64":     { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" }
            }
          }
          EOF
          cat latest.json
          if ! gh release view channel-beta --repo "$REPO" >/dev/null 2>&1; then
            gh release create channel-beta --repo "$REPO" --prerelease --target main \
              --title channel-beta --notes "Rolling beta channel — current beta installers + manifest. Do not delete."
          fi
          # Publish atomically so a client updating mid-run never sees a half-written
          # state (this caused a transient "error sending request" once):
          # 1) installers first — versioned names, so they don't clobber prior betas
          #    and the manifest below can only reference files that already exist;
          # 2) latest.json (the update trigger) LAST, swapped atomically via a temp
          #    asset + rename, so it's never momentarily absent or half-uploaded.
          gh release upload channel-beta "$EXE" "$DEB" "$RPM" --repo "$REPO" --clobber
          cp latest.json latest.json.new
          gh release upload channel-beta latest.json.new --repo "$REPO" --clobber
          gh release delete-asset channel-beta latest.json --repo "$REPO" --yes 2>/dev/null || true
          NEW_URL=$(gh release view channel-beta --repo "$REPO" --json assets \
            --jq '.assets[] | select(.name=="latest.json.new") | .apiUrl')
          gh api --method PATCH "$NEW_URL" -f name=latest.json >/dev/null
          # Prune stale assets from previous betas (after the swap, so latest.json stays).
          KEEP=" $WIN_FILE $DEB_FILE $RPM_FILE latest.json "
          for a in $(gh release view channel-beta --repo "$REPO" --json assets --jq '.assets[].name'); do
            case "$KEEP" in *" $a "*) ;; *) echo "prune $a"; gh release delete-asset channel-beta "$a" --repo "$REPO" --yes || true;; esac
          done
