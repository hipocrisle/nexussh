name: Build NexuSSH (Android)

# Cloud APK builds — GitHub runner has the cumulative RAM (Gradle + Kotlin +
# rustc cross-compile to 4 arches) that DE-1 doesn't, and the user explicitly
# asked to offload these. Triggered manually or on tag push so we don't burn
# minutes on every commit.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          # Only cache the user-home Gradle dirs. The project-local
          # gen/android/.gradle is per-run state — caching it left a
          # partial gen/android tree behind that confused `tauri android
          # init` ("directory does not exist" on a stale half-tree).
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Initialise Android project scaffolding
        working-directory: desktop
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        # gen/android is gitignored — recreate it from tauri.conf.json on every
        # CI run. `init` is idempotent and fast (no Gradle/Kotlin work).
        run: npm run tauri android init

      - name: Apply NexuSSH app icons
        working-directory: desktop
        # `tauri android init` overwrites the launcher icons in gen/android
        # with Tauri's default squiggle every run. Copy our matrix-themed
        # icons back over them.
        run: |
          cp -r src-tauri/icons/android/* \
            src-tauri/gen/android/app/src/main/res/

      - name: Build Android APK (debug, arm64 only)
        working-directory: desktop
        env:
          # tauri.android.conf.json strips externalBin (xray sidecar) — we
          # don't ship the desktop VPN proxy in the APK.
          NDK_HOME: ${{ env.NDK_HOME }}
        # `--target aarch64` builds just the arm64 native lib. The previous
        # universal APK shipped four full copies of every dependency (arm64,
        # armv7, x86, x86_64) and weighed 825 MB. arm64-only is ~200 MB and
        # covers every Android phone shipped since ~2017. Release build
        # would shrink further (~30–80 MB) but requires signing setup; we
        # can ship that as a follow-up if 200 MB is still too painful.
        run: |
          npm run tauri android build -- --debug --apk \
            --target aarch64
          find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -print

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexussh-android-release
          path: desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 14

      - name: Attach APKs to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: true
          prerelease: false
