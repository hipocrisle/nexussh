name: Build NexuSSH

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexussh-windows
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: nexussh-linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # .deb + .rpm используют СИСТЕМНЫЙ WebKitGTK (зависимость пакета) — поэтому
      # рендерят на любой современной Ubuntu/CentOS без белого экрана (в отличие от
      # AppImage с встроенным старым webkit). `rpm` нужен для сборки .rpm-бандла.
      - name: Install Linux build deps (+ rpm for .rpm bundle)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config \
            patchelf rpm

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Fetch xray-core sidecar
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          mkdir -p binaries
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)   ASSET=Xray-windows-64.zip; BIN=xray.exe; OUT="binaries/xray-${{ matrix.target }}.exe";;
            x86_64-unknown-linux-gnu) ASSET=Xray-linux-64.zip;   BIN=xray;     OUT="binaries/xray-${{ matrix.target }}";;
            *) echo "no xray asset mapping for ${{ matrix.target }}"; exit 1;;
          esac
          curl -fSL -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/$ASSET"
          unzip -o xray.zip "$BIN" -d xray_tmp
          mv "xray_tmp/$BIN" "$OUT"
          chmod +x "$OUT" || true
          rm -rf xray.zip xray_tmp
          ls -la "$OUT"

      - name: Clean prior bundle artifacts (avoid stale cached versions)
        working-directory: desktop/src-tauri
        shell: bash
        run: rm -rf target/${{ matrix.target }}/release/bundle

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: List Linux bundles (debug — confirm .deb/.rpm + .sig exist)
        if: matrix.os == 'ubuntu-24.04'
        run: ls -laR desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm || true

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          retention-days: 14

      - name: Upload Linux packages (.deb + .rpm + sigs)
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm.sig
          retention-days: 14

      - name: Upload release assets (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm.sig
          # DRAFT до публикации latest.json — иначе релиз станет latest, пока
          # latest.json ещё 404, и in-app updater словит "Could not fetch release JSON".
          # Бета-теги (vX.Y.Z-beta.N) публикуются как prerelease → не становятся
          # releases/latest, поэтому старые stable-клиенты их не видят.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta.') }}

  generate-update-manifest:
    name: Generate updater manifest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json (deb + rpm suffixed keys)
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Подписи (.sig) из только что опубликованного релиза.
          mkdir -p /tmp/sigs && cd /tmp/sigs
          gh release download "$TAG" --repo "${{ github.repository }}" -p "*.sig" || true
          WIN_SIG=$(cat *.exe.sig 2>/dev/null | head -1 || true)
          DEB_SIG=$(cat *.deb.sig 2>/dev/null | head -1 || true)
          RPM_SIG=$(cat *.rpm.sig 2>/dev/null | head -1 || true)
          cd "$GITHUB_WORKSPACE"

          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          pick() { gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
                   --jq ".assets[] | select(.name | endswith(\"$1\")) | .name" | head -1; }
          WIN_FILE=$(pick ".exe")
          DEB_FILE=$(pick ".deb")
          RPM_FILE=$(pick ".rpm")
          echo "WIN=$WIN_FILE DEB=$DEB_FILE RPM=$RPM_FILE"

          # Tauri-updater сам выбирает ключ по типу установки (deb->...-deb, rpm->...-rpm).
          # Голый linux-x86_64 — фоллбэк (ставим на deb).
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub.",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64":   { "signature": "$WIN_SIG", "url": "$BASE/$WIN_FILE" },
              "linux-x86_64-deb": { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" },
              "linux-x86_64-rpm": { "signature": "$RPM_SIG", "url": "$BASE/$RPM_FILE" },
              "linux-x86_64":     { "signature": "$DEB_SIG", "url": "$BASE/$DEB_FILE" }
            }
          }
          EOF
          cat latest.json

      - name: Publish manifest to rolling channel + versioned release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          CHANNEL=stable
          case "$TAG" in *-beta.*) CHANNEL=beta;; esac
          echo "channel=$CHANNEL"

          # 1) Rolling per-channel manifest release — this is the endpoint the
          #    in-app updater polls (releases/download/channel-<c>/latest.json).
          #    Kept as a prerelease so it never hijacks releases/latest.
          if ! gh release view "channel-$CHANNEL" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "channel-$CHANNEL" --repo "$REPO" --prerelease \
              --target main --title "channel-$CHANNEL" \
              --notes "Rolling updater manifest for the $CHANNEL channel — do not delete."
          fi
          gh release upload "channel-$CHANNEL" latest.json --repo "$REPO" --clobber

          # 2) Publish the versioned release that holds the installers.
          if [ "$CHANNEL" = stable ]; then
            # Back-compat: pre-2.0.0 installs still poll releases/latest/download/latest.json.
            gh release upload "$TAG" latest.json --repo "$REPO" --clobber
            gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          else
            # Beta stays a prerelease (not "latest") so only opted-in beta clients pull it.
            gh release edit "$TAG" --repo "$REPO" --draft=false --prerelease
          fi
