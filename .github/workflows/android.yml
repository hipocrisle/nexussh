name: Build NexuSSH (Android)

# Cloud APK builds — GitHub runner has the cumulative RAM (Gradle + Kotlin +
# rustc cross-compile to 4 arches) that DE-1 doesn't, and the user explicitly
# asked to offload these. Triggered manually or on tag push so we don't burn
# minutes on every commit.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          # Only cache the user-home Gradle dirs. The project-local
          # gen/android/.gradle is per-run state — caching it left a
          # partial gen/android tree behind that confused `tauri android
          # init` ("directory does not exist" on a stale half-tree).
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Pin debug.keystore (stable signature across builds)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        # GitHub's runner generates a fresh debug.keystore on every job, which
        # gives each APK a different signature — Android then refuses to update
        # an existing install ("App not installed"). We pin a static keystore
        # stored as a workflow secret so every CI build signs with the same
        # certificate. If the secret isn't set yet we fall back to the SDK
        # default, but updates between such builds will break.
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
            chmod 600 ~/.android/debug.keystore
            echo "Pinned debug.keystore ($(stat -c%s ~/.android/debug.keystore) bytes)"
          else
            echo "::warning::ANDROID_DEBUG_KEYSTORE_B64 not set — APK will be signed with a fresh runner-generated keystore; updates will fail with 'App not installed'."
          fi

      - name: Initialise Android project scaffolding
        working-directory: desktop
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        # gen/android is gitignored — recreate it from tauri.conf.json on every
        # CI run. `init` is idempotent and fast (no Gradle/Kotlin work).
        run: npm run tauri android init

      - name: Apply NexuSSH app icons
        working-directory: desktop
        # `tauri android init` overwrites the launcher icons in gen/android
        # with Tauri's default squiggle every run. Copy our matrix-themed
        # icons back over them.
        run: |
          cp -r src-tauri/icons/android/* \
            src-tauri/gen/android/app/src/main/res/

      - name: Drop keystore into gen/android (for explicit signingConfig)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        # We've watched AGP repeatedly ignore ~/.android/debug.keystore on
        # this runner (regenerates its own per-run). Park the keystore
        # inside the project tree where the explicit signingConfig in
        # build.gradle.kts (added by the next step) will pick it up.
        working-directory: desktop
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > src-tauri/gen/android/debug.keystore
            chmod 600 src-tauri/gen/android/debug.keystore
            echo "Dropped gen/android/debug.keystore ($(stat -c%s src-tauri/gen/android/debug.keystore) bytes)"
          else
            echo "::warning::ANDROID_DEBUG_KEYSTORE_B64 not set — debug.keystore in project tree won't exist, AGP will fall back."
          fi

      - name: Patch AndroidManifest + signingConfig
        working-directory: desktop
        # Adds REQUEST_INSTALL_PACKAGES + FileProvider so the app can hand
        # the freshly-downloaded update APK to Android's PackageInstaller,
        # AND wires signingConfigs.debug to gen/android/debug.keystore
        # explicitly. AGP defaults silently fail on this runner.
        run: ./scripts/patch-android-manifest.sh src-tauri/gen/android

      - name: Build Android APK (release, arm64 only)
        working-directory: desktop
        env:
          # tauri.android.conf.json strips externalBin (xray sidecar) — we
          # don't ship the desktop VPN proxy in the APK.
          NDK_HOME: ${{ env.NDK_HOME }}
        # Release is the DEFAULT for `tauri android build` (debug needs
        # --debug), so we just omit --debug. Signed with the pinned keystore,
        # minify OFF (see patch-android-manifest.sh): arm64-only, no debug
        # symbols, ~half the debug size. arm64 covers every phone since ~2017.
        run: |
          npm run tauri android build -- --apk \
            --target aarch64
          find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -print

      # Normalise the signed release APK to a stable filename and compute its
      # SHA-256, which the in-app updater verifies before installing (fail-closed
      # — see android_updater.rs).
      - name: Stage release APK + compute SHA-256
        working-directory: desktop
        run: |
          set -euo pipefail
          SRC=$(find src-tauri/gen/android/app/build/outputs/apk -name '*-release*.apk' | head -1)
          if [ -z "$SRC" ]; then echo "no release APK found"; exit 1; fi
          mkdir -p dist-android
          cp "$SRC" dist-android/nexussh-arm64-v8a.apk
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          SHA=$(sha256sum dist-android/nexussh-arm64-v8a.apk | awk '{print $1}')
          URL="https://github.com/hipocrisle/nexussh/releases/download/v${VERSION}/nexussh-arm64-v8a.apk"
          cat > dist-android/latest-android.json <<EOF
          {"version":"${VERSION}","sha256":"${SHA}","url":"${URL}","notes":"NexuSSH ${VERSION}"}
          EOF
          echo "APK: $(stat -c%s dist-android/nexussh-arm64-v8a.apk) bytes, sha256=$SHA"
          cat dist-android/latest-android.json

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexussh-android-release
          path: desktop/dist-android/*
          retention-days: 14

      - name: Attach APK + manifest to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist-android/nexussh-arm64-v8a.apk
            desktop/dist-android/latest-android.json
          draft: true
          prerelease: false
