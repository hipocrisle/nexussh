name: Build NexuSSH (Android)

# Cloud APK builds — GitHub runner has the cumulative RAM (Gradle + Kotlin +
# rustc cross-compile to 4 arches) that DE-1 doesn't, and the user explicitly
# asked to offload these. Triggered manually or on tag push so we don't burn
# minutes on every commit.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            desktop/src-tauri/gen/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('desktop/src-tauri/gen/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Initialise Android project scaffolding
        working-directory: desktop
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        # gen/android is gitignored — recreate it from tauri.conf.json on every
        # CI run. `init` is idempotent and fast (no Gradle/Kotlin work).
        run: npm run tauri android init

      - name: Build Android APK (debug)
        working-directory: desktop
        env:
          # tauri.android.conf.json strips externalBin (xray sidecar) — we don't
          # ship the desktop VPN proxy in the APK; mobile will use direct
          # russh-over-VPN-of-host or its own future transport.
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npm run tauri android build -- --debug --apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexussh-android-debug
          path: desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 14

      - name: Attach APK to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: true
          prerelease: false
